<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

  <title>UrbanEyes Map</title>

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map{
        height:600px;
        width:100%;
    }

    body{
        font-family:Arial,sans-serif;
        margin:20px;
    }
  </style>

</head>

<body>

<h1>📍 UrbanEyes Live Issue Map</h1>

<div id="map"></div>

<script th:inline="javascript">

  var map = L.map('map').setView([26.7271,88.3953],13);

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution:'OpenStreetMap'
    }
  ).addTo(map);

  var issues = [[${issues}]];

  issues.forEach(function(issue){

      if(issue.latitude && issue.longitude){

          var color = "blue";

if(issue.severity === "High" || issue.severity === "SEVERE"){
    color = "red";
}
else if(issue.severity === "Medium"){
    color = "orange";
}
else{
    color = "green";
}

var icon = L.divIcon({
    html: '<div style="background:'+color+';width:16px;height:16px;border-radius:50%;"></div>',
    className: ''
});

L.marker(
    [issue.latitude, issue.longitude],
    {icon: icon}
)
.addTo(map)
.bindPopup(
    "<b>" + issue.issueType + "</b><br>" +
    "Severity: " + issue.severity + "<br>" +
    "Location: " + issue.location + "<br>" +
    "Risk: " + issue.riskLevel
);

      }

  });

</script>

</body>
</html>
