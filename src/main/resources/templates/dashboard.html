
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>UrbanEyes Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">

        <span class="navbar-brand">
            🚀 UrbanEyes
        </span>

        <div>
            <a href="/report" class="btn btn-primary me-2">
                Report Issue
            </a>

            <a href="/map" class="btn btn-success">
                Live Map
            </a>
            <a href="/analytics" class="btn btn-warning">
                Analytics
            </a>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <h1 class="text-center mb-4">
        🚀 UrbanEyes Dashboard
    </h1>

    <!-- Stats Card -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Total Issues</h5>
                    <h1 th:text="${totalIssues}">0</h1>
                </div>
            </div>
        </div>

    </div>
    <div class="alert alert-info shadow mb-4">

        <h5>🤖 AI Insights</h5>

        <p>
            Total active issues:
            <strong th:text="${totalIssues}"></strong>
        </p>

        <p>
            High severity issues require immediate attention.
        </p>

    </div>

    <!-- Issues Table -->
    <table class="table table-striped table-bordered shadow">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Issue Type</th>
            <th>Severity</th>
            <th>Confidence</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="issue : ${issues}">

            <td th:text="${issue.id}"></td>

            <td th:text="${issue.issueType}"></td>

            <td>

                <span th:if="${issue.severity == 'High'}"
                      class="badge bg-danger">
                    High
                </span>

                <span th:if="${issue.severity == 'Medium'}"
                      class="badge bg-warning text-dark">
                    Medium
                </span>

                <span th:if="${issue.severity == 'Low'}"
                      class="badge bg-success">
                    Low
                </span>

                <span th:if="${issue.severity == 'SEVERE'}"
                      class="badge bg-dark">
                    SEVERE
                </span>

            </td>

            <td th:text="${issue.confidenceScore}"></td>

        </tr>

        </tbody>

    </table>

    <div class="mt-3">

        <a href="/report" class="btn btn-primary">
            Report New Issue
        </a>

        <a href="/map" class="btn btn-success">
            View Live Map
        </a>

    </div>

</div>

</body>
</html>
