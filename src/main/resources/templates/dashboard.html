<!DOCTYPE html>
<nav class="navbar navbar-dark bg-dark mb-4">

    <div class="container-fluid">

        <span class="navbar-brand">
            🚀 UrbanEyes
        </span>

        <a href="/report"
           class="btn btn-primary">
            Report Issue
        </a>

    </div>

</nav>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>UrbanEyes Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">
        🚀 UrbanEyes Dashboard
    </h1>

    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Total Issues</h5>
                    <h2 th:text="${totalIssues}"></h2>
                </div>
            </div>
        </div>

    </div>
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Total Issues</h5>
                    <h1 th:text="${totalIssues}"></h1>
                </div>
            </div>
        </div>

    </div>

    <table class="table table-striped table-bordered shadow">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Issue Type</th>
            <th>Severity</th>
            <th>Confidence</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="issue : ${issues}">
            <td th:text="${issue.id}"></td>
            <td th:text="${issue.issueType}"></td>
            <td>
    <span th:if="${issue.severity=='High'}"
          class="badge bg-danger">
          High
    </span>

                <span th:if="${issue.severity=='Medium'}"
                      class="badge bg-warning">
          Medium
    </span>

                <span th:if="${issue.severity=='Low'}"
                      class="badge bg-success">
          Low
    </span>

                <span th:if="${issue.severity=='SEVERE'}"
                      class="badge bg-dark">
          SEVERE
    </span>
            </td>
            <td th:text="${issue.confidenceScore}"></td>
        </tr>

        </tbody>

    </table>

    <a href="/report" class="btn btn-primary">
        Report New Issue
    </a>

</div>

</body>
</html>
