<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>UrbanEyes Analytics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">
        📊 UrbanEyes Analytics
    </h1>

    <div class="row">

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Total Issues</h5>
                    <h1 th:text="${totalIssues}"></h1>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
